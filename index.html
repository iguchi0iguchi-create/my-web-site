<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 | My Web Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="profile">
    <section class="hero">
      <p class="eyebrow">Profile</p>
      <h1>こんにちは</h1>
      <p class="lead">
        これはGitHub Pagesで公開する、自己紹介のためのWebサイトです。
      </p>
    </section>

    <section class="content-grid" aria-label="自己紹介">
      <article class="card">
        <h2>About</h2>
        <p>
          ここに自己紹介文を入れます。学んでいること、興味のある分野、
          好きなことなどを自由に紹介できます。
        </p>
      </article>

      <article class="card">
        <h2>Interests</h2>
        <ul class="tag-list">
          <li>Web制作</li>
          <li>プログラミング</li>
          <li>デザイン</li>
        </ul>
      </article>
    </section>
  </main>
</body>
</html>
